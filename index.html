<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Commission Sociale DMN – ESP</title>
    <meta name="description" content="Application de gestion de caisse pour la Commission Sociale du Daara Madjmahoune Noreyni – UCAD ESP." />
    <meta name="theme-color" content="#064e3b" />
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root">
      <style>
        body { margin: 0; background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .preloader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; background-color: #f8fafc; }
        .preloader-logo { width: 96px; height: 96px; background-color: #ecfdf5; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 32px; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06); border: 4px solid #d1fae5; position: relative; }
        .preloader-spinner { position: absolute; inset: 0; border: 4px solid #a7f3d0; border-top-color: #059669; border-radius: 24px; animation: spin 1s linear infinite; }
        .preloader-icon { font-size: 48px; }
        .preloader-title { font-size: 24px; font-weight: 900; color: #064e3b; margin: 0 0 8px 0; letter-spacing: -0.025em; }
        .preloader-subtitle { font-size: 14px; font-weight: 700; color: #059669; text-transform: uppercase; letter-spacing: 0.1em; margin: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div class="preloader">
        <div class="preloader-logo">
          <div class="preloader-spinner"></div>
          <span class="preloader-icon">🕌</span>
        </div>
        <h1 class="preloader-title">Commission Sociale</h1>
        <p class="preloader-subtitle">Daara Madjmahoune Noreyni</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
